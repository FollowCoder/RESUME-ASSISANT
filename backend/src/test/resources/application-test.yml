# 测试环境配置 - 使用 H2 内存数据库，避免依赖外部 PostgreSQL
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

# 禁用 AgentScope 自动配置（测试不需要）
agentscope:
  dashscope:
    api-key: test-key
