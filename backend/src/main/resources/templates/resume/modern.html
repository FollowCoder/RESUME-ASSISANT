<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            font-size: 10pt;
            line-height: 1.6;
            color: #2c3e50;
            background: #fff;
        }
        .resume-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm 18mm;
        }
        .header {
            background: #2980b9;
            color: #fff;
            padding: 24px 30px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 26pt;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .contact {
            font-size: 10pt;
            opacity: 0.9;
        }
        .contact span {
            margin-right: 18px;
            display: inline-block;
        }
        section {
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            padding: 16px 20px;
            border-left: 4px solid #2980b9;
        }
        section h2 {
            font-size: 13pt;
            font-weight: 700;
            color: #2980b9;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e0e0e0;
        }
        .work-item, .project-item {
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ddd;
        }
        .work-item:last-child, .project-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .work-header, .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .work-header strong, .project-header strong {
            font-size: 11pt;
            color: #2c3e50;
        }
        .work-header span, .project-header span {
            font-size: 9pt;
            color: #7f8c8d;
        }
        .edu-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .edu-item strong { font-size: 11pt; }
        .edu-item span { font-size: 9pt; color: #7f8c8d; }
        p { margin: 4px 0; font-size: 10pt; color: #444; }
        ul {
            margin: 6px 0 6px 18px;
            font-size: 10pt;
        }
        ul li { margin-bottom: 3px; color: #444; }
        em { font-size: 9pt; color: #7f8c8d; }
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            font-size: 9pt;
            padding: 4px 12px;
            background: #2980b9;
            color: #fff;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div th:if="${content == null}" style="text-align:center;padding:50px;color:#999;">
        <p>简历内容为空，无法预览。请返回编辑页面完善简历信息。</p>
    </div>
    <div class="resume-container" th:if="${content != null}">
        <div class="header" th:if="${content.basicInfo}">
            <h1 th:text="${content.basicInfo.name}">姓名</h1>
            <div class="contact">
                <span th:if="${content.basicInfo.phone}" th:text="${content.basicInfo.phone}"></span>
                <span th:if="${content.basicInfo.email}" th:text="${content.basicInfo.email}"></span>
                <span th:if="${content.basicInfo.location}" th:text="${content.basicInfo.location}"></span>
            </div>
        </div>

        <section class="summary" th:if="${content.summary}">
            <h2 th:text="${language == 'en' ? 'Summary' : '个人总结'}">个人总结</h2>
            <p th:text="${content.summary}"></p>
        </section>

        <section class="work" th:if="${content.workExperience != null and !content.workExperience.isEmpty()}">
            <h2 th:text="${language == 'en' ? 'Work Experience' : '工作经历'}">工作经历</h2>
            <div th:each="work : ${content.workExperience}" class="work-item">
                <div class="work-header">
                    <strong th:text="${work.company}"></strong>
                    <span th:text="${work.position}"></span>
                    <span th:text="|${work.startDate} - ${work.endDate}|"></span>
                </div>
                <p th:if="${work.description}" th:text="${work.description}"></p>
                <ul th:if="${work.achievements != null and !work.achievements.isEmpty()}">
                    <li th:each="a : ${work.achievements}" th:text="${a}"></li>
                </ul>
            </div>
        </section>

        <section class="projects" th:if="${content.projectExperience != null and !content.projectExperience.isEmpty()}">
            <h2 th:text="${language == 'en' ? 'Projects' : '项目经验'}">项目经验</h2>
            <div th:each="proj : ${content.projectExperience}" class="project-item">
                <div class="project-header">
                    <strong th:text="${proj.name}"></strong>
                    <span th:text="${proj.role}"></span>
                    <span th:text="|${proj.startDate} - ${proj.endDate}|"></span>
                </div>
                <p th:if="${proj.description}" th:text="${proj.description}"></p>
                <p th:if="${proj.techStack}"><em th:text="|技术栈：${proj.techStack}|"></em></p>
                <ul th:if="${proj.highlights != null and !proj.highlights.isEmpty()}">
                    <li th:each="h : ${proj.highlights}" th:text="${h}"></li>
                </ul>
            </div>
        </section>

        <section class="education" th:if="${content.education != null and !content.education.isEmpty()}">
            <h2 th:text="${language == 'en' ? 'Education' : '教育背景'}">教育背景</h2>
            <div th:each="edu : ${content.education}" class="edu-item">
                <strong th:text="${edu.school}"></strong>
                <span th:text="|${edu.degree} · ${edu.major}|"></span>
                <span th:text="|${edu.startDate} - ${edu.endDate}|"></span>
            </div>
        </section>

        <section class="skills" th:if="${content.skills != null and !content.skills.isEmpty()}">
            <h2 th:text="${language == 'en' ? 'Skills' : '专业技能'}">专业技能</h2>
            <div class="skills-list">
                <span th:each="skill : ${content.skills}" class="skill-tag" th:text="${skill}"></span>
            </div>
        </section>
    </div>
</body>
</html>
