server:
  port: 8080

spring:
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false
    check-template-location: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/resume_assistant
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

agentscope:
  dashscope:
    api-key:
  llm:
    provider: dashscope
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    main-model: qwen-max
    light-model: qwen-turbo
    multi-agent-model: qwen-plus

app:
  upload:
    path: ${user.home}/resume-assistant/uploads
  jwt:
    secret: ${JWT_SECRET:resume-assistant-jwt-secret-key-must-be-at-least-256-bits-long}
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:5173
  speech:
    asr-model: fun-asr-realtime
    tts-model: cosyvoice-v1
    tts-voice: longxiaochun
