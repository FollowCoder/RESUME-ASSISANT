version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-postgres
    environment:
      POSTGRES_DB: resume_assistant
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resume_assistant
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      AGENTSCOPE_LLM_API_KEY: ${DASHSCOPE_API_KEY}
      AGENTSCOPE_LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      APP_JWT_SECRET: ${JWT_SECRET:-resume-assistant-jwt-secret-key-must-be-at-least-256-bits-long}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:80,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: